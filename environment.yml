name: ml-classification
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Data science
  - pandas=2.0.3
  - numpy=1.24.3
  - scipy=1.11.1
  
  # Machine learning
  - scikit-learn=1.3.0
  - xgboost=2.0.0
  - lightgbm=4.0.0
  
  # Deep learning
  - pytorch::pytorch=2.0.1
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision=0.15.2
  - pytorch::torchaudio=2.0.2
  
  # Visualization
  - matplotlib=3.7.2
  - seaborn=0.12.2
  - plotly=5.16.1
  
  # Jupyter
  - jupyter=1.0.0
  - jupyterlab=4.0.4
  - ipywidgets=8.0.7
  - ipykernel=6.25.1
  
  # Utilities
  - pyyaml=6.0
  - tqdm=4.65.0
  - joblib=1.3.1
  - git=2.41.0
  - wget=1.21.3
