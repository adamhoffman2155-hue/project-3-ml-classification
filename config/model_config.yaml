# Default model hyperparameters for genomic classification
# --------------------------------------------------------

# General settings
random_state: 42
cv_folds: 5
test_size: 0.2
n_features: 500
scaling_method: "standard"
feature_selection_method: "mutual_info"

# Logistic Regression
lr_max_iter: 1000
lr_solver: "lbfgs"
lr_C: 1.0

# Random Forest
rf_n_estimators: 200
rf_max_depth: null
rf_min_samples_split: 5
rf_min_samples_leaf: 2

# Gradient Boosting
gb_n_estimators: 200
gb_learning_rate: 0.1
gb_max_depth: 5
gb_min_samples_split: 5
gb_min_samples_leaf: 2
gb_subsample: 0.8

# Elastic Net (SGD-based)
en_l1_ratio: 0.5
en_alpha: 0.0001
en_max_iter: 1000
