name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # torch is declared in requirements.txt but only needed for neural_net.py,
          # which is lazy-imported. Skip it here to keep CI fast and light.
          pip install pandas numpy scipy scikit-learn shap \
                      matplotlib seaborn pyyaml pytest

      - name: Generate synthetic-GDSC fixture
        run: python scripts/generate_synthetic_gdsc.py

      - name: Run pytest
        run: pytest -v --tb=short

  manifest-drift:
    name: results/poc/manifest.json is reproducible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pandas numpy scikit-learn
      - name: Generate synthetic fixture + run POC (writes results/poc/)
        run: python scripts/poc/run_poc.py
      - name: Fail if the committed manifest has drifted
        run: |
          python - <<'PY'
          import json, subprocess, sys
          committed = json.loads(subprocess.check_output(
              ["git", "show", "HEAD:results/poc/manifest.json"]))
          with open("results/poc/manifest.json") as fh:
              regen = json.load(fh)
          for d in (committed, regen):
              d.pop("generated_at", None)
          if committed != regen:
              print("ERROR: results/poc/manifest.json is stale vs run_poc.py",
                    file=sys.stderr)
              print("Re-run 'python scripts/poc/run_poc.py' and commit.",
                    file=sys.stderr)
              sys.exit(1)
          print("OK: committed manifest reproduces from scripts/poc/run_poc.py")
          PY

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src scripts tests --select E9,F63,F7,F82
